<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuegaConmigo 🌈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#ffd93d;--orange:#ff6b35;--green:#22c55e;--blue:#3b82f6;
  --purple:#a855f7;--pink:#ec4899;--red:#ef4444;--teal:#14b8a6;
  --bg:#fff8f0;--card:#fff;--shadow:rgba(0,0,0,0.12);
}
body{font-family:'Comic Sans MS','Chalkboard SE',cursive;background:var(--bg);min-height:100vh;overflow-x:hidden}

/* ===== SCREENS ===== */
.screen{display:none;width:100%;min-height:100vh;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* ===== MENU ===== */
#menu{padding:16px;background:linear-gradient(160deg,#fff8f0,#fdf4ff)}
#menu h1{font-size:2.4rem;color:var(--orange);text-shadow:3px 3px 0 var(--yellow);text-align:center;margin-bottom:4px}
#menu .sub{text-align:center;color:#999;font-size:.95rem;margin-bottom:16px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;width:100%;max-width:680px}
.gcard{background:#fff;border-radius:20px;padding:14px 8px;text-align:center;cursor:pointer;
  border:3px solid transparent;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 14px var(--shadow)}
.gcard:hover{transform:scale(1.07) rotate(-1.5deg);box-shadow:0 8px 22px var(--shadow)}
.gcard .icon{font-size:2.6rem;display:block;margin-bottom:6px}
.gcard .gname{font-size:.82rem;font-weight:bold;color:#444}
.gcard .gtype{font-size:.68rem;color:#bbb;margin-top:2px}
.gcard.arrow{border-color:#a78bfa}
.gcard.mouse{border-color:#34d399}

/* ===== LEVEL SELECT ===== */
#levelscreen{padding:16px;align-items:center}
#levelscreen h2{font-size:1.8rem;color:var(--orange);text-shadow:2px 2px 0 var(--yellow);margin-bottom:4px}
.levels-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;max-width:500px;width:100%;margin-top:14px}
.lvl-btn{background:#fff;border:3px solid #e2e8f0;border-radius:16px;padding:10px 4px;cursor:pointer;
  text-align:center;transition:transform .1s,border-color .1s;font-family:inherit}
.lvl-btn:hover:not(.locked){transform:scale(1.1);border-color:var(--orange)}
.lvl-btn .lnum{font-size:1.4rem;font-weight:bold;color:#444;display:block}
.lvl-btn .lstars{font-size:.75rem;color:var(--yellow);display:block;min-height:14px}
.lvl-btn.locked{opacity:.4;cursor:default;filter:grayscale(1)}
.lvl-btn.done{border-color:var(--green)}
.lvl-btn.current{border-color:var(--orange);background:#fff7ed}
.lvl-preview{background:#fff;border-radius:14px;padding:12px 20px;margin-top:14px;
  text-align:center;font-size:.9rem;color:#666;max-width:400px;border:2px dashed #fbbf24}
.btn-back{background:var(--orange);color:#fff;border:none;border-radius:30px;padding:9px 22px;
  font-size:1rem;font-family:inherit;cursor:pointer;margin-bottom:12px;
  box-shadow:0 3px 10px rgba(255,107,53,.4)}
.btn-back:hover{background:#e0521f}
.btn-play-lvl{background:var(--green);color:#fff;border:none;border-radius:30px;padding:10px 28px;
  font-size:1.1rem;font-family:inherit;cursor:pointer;margin-top:10px;
  box-shadow:0 3px 10px rgba(34,197,94,.4)}
.btn-play-lvl:hover{background:#16a34a}

/* ===== GAME SCREEN ===== */
#gamescreen{padding:10px;align-items:center}
.game-header{display:flex;align-items:center;gap:10px;width:100%;max-width:520px;margin-bottom:8px}
.game-header .info-row{flex:1;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.stat-pill{background:#fff;border-radius:30px;padding:5px 14px;font-size:.95rem;color:#555;
  box-shadow:0 2px 8px var(--shadow);white-space:nowrap}
.stat-pill span{font-weight:bold;color:var(--orange)}
.lvl-stars{font-size:1.1rem;color:var(--yellow);letter-spacing:2px}
.canvas-wrap{background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 6px 24px var(--shadow);position:relative;cursor:none}
canvas{display:block}
.msg-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(255,255,255,.93);border-radius:20px;
  z-index:100;gap:8px;pointer-events:none}
.msg-overlay.show{display:flex}
.msg-emoji{font-size:4rem}
.msg-title{font-size:1.8rem;font-weight:bold;color:var(--orange)}
.msg-sub{font-size:.95rem;color:#888}
.instructions{margin-top:8px;background:#fffbe6;border-radius:12px;padding:8px 16px;
  font-size:.82rem;color:#777;max-width:520px;text-align:center;border:2px dashed var(--yellow)}

/* ===== WIN OVERLAY ===== */
.win-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(255,255,255,.96);border-radius:20px;z-index:200;gap:10px}
.win-overlay.show{display:flex}
.win-stars{font-size:2.5rem;letter-spacing:4px}
.win-btn{background:var(--orange);color:#fff;border:none;border-radius:30px;padding:10px 24px;
  font-size:1rem;font-family:inherit;cursor:pointer;box-shadow:0 3px 10px rgba(255,107,53,.4);margin:4px}
.win-btn:hover{background:#e0521f}
.win-btn.green{background:var(--green);box-shadow:0 3px 10px rgba(34,197,94,.4)}
.win-btn.green:hover{background:#16a34a}
</style>
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menu" class="screen active">
  <h1>🌈 JuegaConmigo</h1>
  <p class="sub">¡Elige un juego y comienza a jugar!</p>
  <div class="games-grid" id="games-grid"></div>
</div>

<!-- ===== LEVEL SELECT ===== -->
<div id="levelscreen" class="screen">
  <button class="btn-back" onclick="showMenu()">← Menú</button>
  <div id="ls-icon" style="font-size:3rem"></div>
  <h2 id="ls-title"></h2>
  <div class="levels-grid" id="levels-grid"></div>
  <div class="lvl-preview" id="lvl-preview"></div>
  <button class="btn-play-lvl" id="btn-play-lvl">¡Jugar! 🎮</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="gamescreen" class="screen">
  <div class="game-header">
    <button class="btn-back" onclick="showLevels(currentGame)" style="margin:0">← Niveles</button>
    <div class="info-row">
      <div class="stat-pill" id="stat-score" style="display:none">Puntos: <span id="score-val">0</span></div>
      <div class="stat-pill" id="stat-level">Nivel <span id="level-val">1</span></div>
      <div class="stat-pill" id="stat-time" style="display:none">⏰ <span id="time-val">30</span>s</div>
      <div class="stat-pill" id="stat-lives" style="display:none">❤️ <span id="lives-val">3</span></div>
    </div>
  </div>
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="gc" width="500" height="380"></canvas>
    <div class="msg-overlay" id="msg-overlay">
      <div class="msg-emoji" id="msg-emoji"></div>
      <div class="msg-title" id="msg-title"></div>
      <div class="msg-sub" id="msg-sub"></div>
    </div>
    <div class="win-overlay" id="win-overlay">
      <div class="msg-emoji">🎉</div>
      <div class="msg-title" id="win-title">¡Nivel Superado!</div>
      <div class="win-stars" id="win-stars">⭐⭐⭐</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
        <button class="win-btn" onclick="retryLevel()">🔄 Repetir</button>
        <button class="win-btn green" id="btn-next-level" onclick="nextLevel()">▶️ Siguiente</button>
        <button class="win-btn" onclick="showLevels(currentGame)">📋 Niveles</button>
      </div>
    </div>
  </div>
  <div class="instructions" id="instructions"></div>
</div>

<script>
// ================================================================
// STATE
// ================================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let currentGame = null;
let currentLevel = 1;
let animId = null;
let gameRunning = false;
let score = 0;
let lives = 3;
let timeLeft = 30;
let timerInterval = null;
let mouseCursor = {x:-100,y:-100};
let _keyHandler = null;
let _clickHandler = null;
let _moveHandler = null;
let _mousedownHandler = null;
let _mouseupHandler = null;

// Progress saved per game
const progress = JSON.parse(localStorage.getItem('jcm_progress')||'{}');
function saveProgress(game, level, stars) {
  if(!progress[game]) progress[game]={};
  const old = progress[game][level]||0;
  progress[game][level] = Math.max(old, stars);
  localStorage.setItem('jcm_progress', JSON.stringify(progress));
}
function getStars(game,level){ return (progress[game]&&progress[game][level])||0; }
function maxUnlocked(game){
  let m=1;
  for(let l=1;l<=7;l++) if(getStars(game,l)>0) m=l+1;
  return Math.min(m,7);
}

// ================================================================
// GAME DEFINITIONS
// ================================================================
const GAMES = [
  {
    id:'snake', icon:'🐛', name:'El Gusanito', type:'arrow',
    desc:'Come manzanas con el gusanito',
    levels:[

    levels:[

      {label:'Laberinto 9x7'},

  {

    desc:'Salta los obstáculos con el dinosaurio',
    levels:[
      {label:'Pocos obstáculos, lento',speed:2.5,freq:90,double:false},
      {label:'Un poco más rápido',speed:3,freq:80,double:false},
      {label:'Velocidad media',speed:3.5,freq:70,double:false},
      {label:'Obstáculos frecuentes',speed:4,freq:60,double:false},
      {label:'Doble salto disponible',speed:4.5,freq:55,double:true},
      {label:'Rápido con doble salto',speed:5.5,freq:45,double:true},
      {label:'¡Experto! Muy rápido',speed:7,freq:38,double:true},
    ]
  },
  {
    id:'bubbles', icon:'🫧', name:'Rompe Globos', type:'mouse',
    desc:'Haz clic en los globos para reventarlos',
    levels:[
      {label:'Globos lentos, 40 seg',time:40,speed:0.7,size:40,freq:30},
      {label:'Un poco más rápidos',time:35,speed:0.9,size:38,freq:28},
      {label:'Tamaño menor',time:35,speed:1.1,size:34,freq:26},
      {label:'Más rápidos',time:30,speed:1.3,size:32,freq:24},
      {label:'Globos pequeños',time:30,speed:1.5,size:28,freq:22},
      {label:'Rápidos y pequeños',time:25,speed:1.8,size:25,freq:20},
      {label:'¡Experto! Muy difícil',time:25,speed:2.2,size:22,freq:17},
    ]
  },
  {
    id:'paint', icon:'🎨', name:'Pinta y Colorea', type:'mouse',
    desc:'Colorea el dibujo sin salirte',
    levels:[
      {label:'Figura muy grande'},

      {label:'Figura mediana'},

    levels:[

  {

    levels:[
      {label:'Frutas lentas, cesta grande',speed:1.2,bw:100,freq:60},
      {label:'Un poco más rápido',speed:1.5,bw:90,freq:55},
      {label:'Velocidad media',speed:1.9,bw:80,freq:50},
      {label:'Cesta más pequeña',speed:2.2,bw:70,freq:45},
      {label:'Rápido y cesta pequeña',speed:2.7,bw:65,freq:40},

      {label:'¡Experto! Rapidísimo',speed:4,bw:50,freq:28},
    ]
  },
  {
    id:'balloon', icon:'🎈', name:'Globo Feliz', type:'arrow',
    desc:'Navega el globo evitando nubes',
    levels:[
      {label:'Pocas nubes, globo grande',speed:1.5,clouds:3,size:28},
      {label:'Más nubes',speed:2,clouds:4,size:26},

      {label:'Muchas nubes',speed:3,clouds:6,size:22},
      {label:'Nubes y lluvia',speed:3.5,clouds:7,size:20},
      {label:'Muy difícil',speed:4,clouds:8,size:18},
      {label:'¡Experto!',speed:5,clouds:10,size:16},
    ]
  },
  {
    id:'typing', icon:'⌨️', name:'La Letra Mágica', type:'arrow',
    desc:'Presiona la flecha que indica la pantalla',

      {label:'Solo ↑ y ↓, 20 seg',time:20,keys:2,speed:2200},
      {label:'↑ ↓ ← →, 25 seg',time:25,keys:4,speed:2000},
      {label:'Más rápido',time:25,keys:4,speed:1700},
      {label:'Secuencias de 2',time:30,keys:4,speed:1500,seq:2},
      {label:'Secuencias de 2, rápido',time:30,keys:4,speed:1200,seq:2},

      {label:'Secuencias de 3, experto',time:35,keys:4,speed:900,seq:3},
    ]
  },
  {
    id:'color', icon:'🎨', name:'Mezcla Colores', type:'mouse',
    desc:'Arrastra colores para mezclarlos',
    levels:[
      {label:'2 colores primarios',colors:2},
      {label:'3 colores',colors:3},
      {label:'4 colores',colors:4},
      {label:'Colores secundarios',colors:4,secondary:true},
      {label:'5 colores',colors:5,secondary:true},
      {label:'6 colores con mezcla',colors:6,secondary:true},
      {label:'¡Experto! Mezcla libre',colors:6,secondary:true,free:true},
    ]
  },
];

// ================================================================
// NAVIGATION
// ================================================================
function showMenu() {
  stopAll();
  setScreen('menu');
}

function showLevels(gameId) {
  stopAll();
  currentGame = gameId;
  const g = GAMES.find(x=>x.id===gameId);
  document.getElementById('ls-icon').textContent = g.icon;
  document.getElementById('ls-title').textContent = g.name;
  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';
  const unlocked = maxUnlocked(gameId);
  let selectedLevel = Math.min(unlocked, 7);

  function renderGrid() {
    grid.innerHTML='';
    for(let l=1;l<=7;l++) {
      const s = getStars(gameId,l);
      const isLocked = l > unlocked;
      const btn = document.createElement('button');
      btn.className = 'lvl-btn' + (isLocked?' locked':'') + (s>0?' done':'') + (l===selectedLevel&&!isLocked?' current':'');
      btn.innerHTML = `<span class="lnum">${l}</span><span class="lstars">${s>0?'⭐'.repeat(s):''}</span>`;
      if (!isLocked) btn.onclick = () => {
        selectedLevel = l;
        renderGrid();
        updatePreview(l);
      };
      grid.appendChild(btn);
    }
  }

  function updatePreview(l) {
    const cfg = g.levels[l-1];
    document.getElementById('lvl-preview').textContent = `Nivel ${l}: ${cfg.label}`;
    document.getElementById('btn-play-lvl').onclick = () => startGameLevel(gameId, l);
  }

  renderGrid();
  updatePreview(selectedLevel);
  setScreen('levelscreen');
}

function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function stopAll() {
  gameRunning = false;
  if(animId){cancelAnimationFrame(animId);animId=null;}
  clearInterval(timerInterval);
  if(_keyHandler){document.removeEventListener('keydown',_keyHandler);_keyHandler=null;}
  if(_clickHandler){canvas.removeEventListener('click',_clickHandler);_clickHandler=null;}
  if(_moveHandler){canvas.removeEventListener('mousemove',_moveHandler);_moveHandler=null;}
  if(_mousedownHandler){canvas.removeEventListener('mousedown',_mousedownHandler);_mousedownHandler=null;}
  if(_mouseupHandler){canvas.removeEventListener('mouseup',_mouseupHandler);_mouseupHandler=null;}
  hideMsg(); hideWin();
}

function startGameLevel(gameId, level) {
  stopAll();
  currentGame = gameId;
  currentLevel = level;
  score = 0;
  lives = 3;
  document.getElementById('score-val').textContent = '0';
  document.getElementById('level-val').textContent = level;
  document.getElementById('lives-val').textContent = lives;
  hideMsg(); hideWin();

  const showScore = id => { document.getElementById('stat-score').style.display = id?'':'none'; };
  const showTime = id => { document.getElementById('stat-time').style.display = id?'':'none'; };
  const showLives = id => { document.getElementById('stat-lives').style.display = id?'':'none'; };
  showScore(false); showTime(false); showLives(false);

  canvas.width=500; canvas.height=380;

  setScreen('gamescreen');
  const g = GAMES.find(x=>x.id===gameId);
  const cfg = g.levels[level-1];

  switch(gameId) {
    case 'snake':   showScore(true); playSnake(cfg); break;
    case 'maze':    playMaze(cfg, level); break;
    case 'dino':    showScore(true); showLives(true); playDino(cfg); break;
    case 'bubbles': showScore(true); showTime(true); playBubbles(cfg); break;
    case 'paint':   playPaint(cfg, level); break;
    case 'match':   showScore(true); playMatch(cfg); break;
    case 'catch':   showScore(true); showLives(true); playCatch(cfg); break;
    case 'balloon': showScore(true); showLives(true); playBalloon(cfg); break;
    case 'typing':  showScore(true); showTime(true); playTyping(cfg); break;
    case 'color':   showScore(true); playColorMix(cfg, level); break;
  }
}

function retryLevel(){ startGameLevel(currentGame, currentLevel); }
function nextLevel(){
  if(currentLevel<7) startGameLevel(currentGame, currentLevel+1);
  else showLevels(currentGame);
}

// ================================================================
// MSG / WIN
// ================================================================
function showMsg(emoji,title,sub){
  document.getElementById('msg-emoji').textContent=emoji;
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-sub').textContent=sub||'';
  document.getElementById('msg-overlay').classList.add('show');
}
function hideMsg(){ document.getElementById('msg-overlay').classList.remove('show'); }
function showWin(stars){
  const s = Math.max(1,Math.min(3,stars));
  saveProgress(currentGame, currentLevel, s);
  document.getElementById('win-stars').textContent='⭐'.repeat(s)+'☆'.repeat(3-s);
  document.getElementById('win-title').textContent = s===3?'¡Perfecto! 🏆':(s===2?'¡Muy bien! 🎉':'¡Lo lograste! 😊');
  document.getElementById('btn-next-level').style.display = currentLevel<7?'':'none';
  document.getElementById('win-overlay').classList.add('show');
}
function hideWin(){ document.getElementById('win-overlay').classList.remove('show'); }
function addScore(n){ score+=n; document.getElementById('score-val').textContent=score; }
function setInstr(t){ document.getElementById('instructions').textContent=t; }
function setLives(n){ lives=n; document.getElementById('lives-val').textContent=n; }

// Canvas mouse tracking
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseCursor.x=(e.clientX-r.left)*(canvas.width/r.width);
  mouseCursor.y=(e.clientY-r.top)*(canvas.height/r.height);
});

// ================================================================
// GAME 1: SNAKE
// ================================================================
function playSnake(cfg) {
  setInstr('⬆️⬇️⬅️➡️ Usa las flechas del teclado para mover el gusanito. ¡Come las manzanas!');
  const CW=500,CH=380,SZ=cfg.size;
  const cols=Math.floor(CW/SZ),rows=Math.floor(CH/SZ);
  let snake=[{x:3,y:Math.floor(rows/2)},{x:2,y:Math.floor(rows/2)},{x:1,y:Math.floor(rows/2)}];
  let dir={x:1,y:0},nextDir={x:1,y:0};
  let apple=rndCell();
  let bonus=null,bonusTick=0;
  let particles=[];
  let tick=0, goal=10+currentLevel*5;
  let applesEaten=0;
  gameRunning=true;

  function rndCell(){
    for(let i=0;i<200;i++){
      const c={x:Math.floor(Math.random()*(cols-2))+1,y:Math.floor(Math.random()*(rows-2))+1};
      if(!snake.some(s=>s.x===c.x&&s.y===c.y)) return c;
    }
    return {x:1,y:1};
  }

  _keyHandler=e=>{
    const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
    if(m[e.key]){e.preventDefault();const d=m[e.key];if(!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;}
  };
  document.addEventListener('keydown',_keyHandler);

  function loop(){
    if(!gameRunning)return;
    tick++;
    ctx.clearRect(0,0,CW,CH);
    // bg
    for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){
      ctx.fillStyle=(i+j)%2===0?'#e8f5e9':'#d4edda';
      ctx.fillRect(i*SZ,j*SZ,SZ,SZ);
    }
    // walls indicator
    if(cfg.walls){
      ctx.strokeStyle='#f87171';ctx.lineWidth=3;
      ctx.strokeRect(1,1,CW-2,CH-2);
    }
    // progress bar
    const pct=Math.min(1,applesEaten/goal);
    ctx.fillStyle='#d1fae5';ctx.fillRect(0,0,CW*pct,4);
    ctx.fillStyle='#22c55e';ctx.fillRect(0,0,CW*pct,4);

    // particles
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      ctx.globalAlpha=p.life/20;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();
      p.x+=p.dx;p.y+=p.dy;p.life--;p.r*=0.93;
    });
    ctx.globalAlpha=1;

    // bonus apple
    if(applesEaten>0&&applesEaten%5===0&&!bonus){
      bonus=rndCell();bonusTick=0;
    }
    if(bonus){
      bonusTick++;
      if(bonusTick>120){bonus=null;}else{
        ctx.font=`${SZ-2}px serif`;
        if(bonusTick%8<4)ctx.fillText('🍓',bonus.x*SZ,bonus.y*SZ+SZ-2);
      }
    }

    if(tick%cfg.speed===0){
      dir=nextDir;
      const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
      const hitWall=cfg.walls?(head.x<0||head.x>=cols||head.y<0||head.y>=rows):(()=>{head.x=(head.x+cols)%cols;head.y=(head.y+rows)%rows;return false;})();
      if(hitWall||snake.some(s=>s.x===head.x&&s.y===head.y)){
        gameRunning=false;
        showMsg('😢','¡Chocaste!','Haz clic para intentar de nuevo');
        canvas.addEventListener('click',()=>setTimeout(retryLevel,200),{once:true});
        return;
      }
      snake.unshift(head);
      let ate=false;
      if(head.x===apple.x&&head.y===apple.y){
        ate=true;applesEaten++;addScore(10);
        for(let i=0;i<8;i++)particles.push({x:apple.x*SZ+SZ/2,y:apple.y*SZ+SZ/2,dx:(Math.random()-.5)*4,dy:(Math.random()-.5)*4,life:20,r:5,color:'#fbbf24'});
        apple=rndCell();
        if(applesEaten>=goal){gameRunning=false;setTimeout(()=>showWin(score>=goal*15?3:score>=goal*10?2:1),300);}
      }
      if(bonus&&head.x===bonus.x&&head.y===bonus.y){ate=true;addScore(25);bonus=null;for(let i=0;i<12;i++)particles.push({x:head.x*SZ+SZ/2,y:head.y*SZ+SZ/2,dx:(Math.random()-.5)*6,dy:(Math.random()-.5)*6,life:25,r:6,color:'#ec4899'});}
      if(!ate)snake.pop();
    }

    // apple
    ctx.font=`${SZ-2}px serif`;
    ctx.fillText('🍎',apple.x*SZ,apple.y*SZ+SZ-2);
    // snake
    snake.forEach((s,i)=>{
      ctx.fillStyle=i===0?'#4ade80':'#22c55e';
      ctx.beginPath();ctx.roundRect(s.x*SZ+2,s.y*SZ+2,SZ-4,SZ-4,5);ctx.fill();
      if(i===0){
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(s.x*SZ+7,s.y*SZ+7,3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(s.x*SZ+SZ-7,s.y*SZ+7,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#166534';
        ctx.beginPath();ctx.arc(s.x*SZ+7,s.y*SZ+7,1.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(s.x*SZ+SZ-7,s.y*SZ+7,1.5,0,Math.PI*2);ctx.fill();
      }
    });
    // goal counter
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='bold 13px sans-serif';ctx.textAlign='right';
    ctx.fillText(`🍎 ${applesEaten}/${goal}`,CW-6,18);ctx.textAlign='left';
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ================================================================
// GAME 2: MAZE
// ================================================================
function playMaze(cfg, level) {
  setInstr('⬆️⬇️⬅️➡️ Usa las flechas para mover al animal hasta la casa 🏠');
  const mazeConfigs=[
    {cols:5,rows:5},{cols:7,rows:7},{cols:9,rows:7},
    {cols:9,rows:9},{cols:11,rows:9},{cols:13,rows:9},{cols:13,rows:11}
  ];
  const {cols,rows}=mazeConfigs[level-1];
  const SZ=Math.min(Math.floor(500/cols),Math.floor(380/rows),40);
  const CW=cols*SZ,CH=rows*SZ;
  canvas.width=CW;canvas.height=CH;

  // Generate maze using recursive backtracker
  const visited=Array.from({length:rows},()=>new Array(cols).fill(false));
  const wallR=Array.from({length:rows},()=>new Array(cols).fill(true)); // right wall
  const wallD=Array.from({length:rows},()=>new Array(cols).fill(true)); // down wall

  function genMaze(r,c){
    visited[r][c]=true;
    const dirs=[[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-.5);
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!visited[nr][nc]){
        if(dr===0)wallR[r][Math.min(c,nc)]=false;
        else wallD[Math.min(r,nr)][c]=false;
        genMaze(nr,nc);
      }
    }
  }
  genMaze(0,0);

  let px=0,py=0;
  const ex=cols-1,ey=rows-1;
  let steps=0,won=false;
  const animals=['🐱','🐭','🐰','🐸','🐧','🦊','🐼'];
  const animal=animals[(level-1)%animals.length];

  function canMove(r,c,dr,dc){
    const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=rows||nc<0||nc>=cols)return false;
    if(dr===0){const mc=Math.min(c,nc);return!wallR[r][mc];}
    else{const mr=Math.min(r,nr);return!wallD[mr][c];}
  }

  _keyHandler=e=>{
    if(won)return;
    const m={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
    if(m[e.key]){
      e.preventDefault();const[dr,dc]=m[e.key];
      if(canMove(py,px,dr,dc)){px+=dc;py+=dr;steps++;draw();}
      if(px===ex&&py===ey){won=true;setTimeout(()=>showWin(steps<(cols*rows)*0.7?3:steps<(cols*rows)?2:1),300);}
    }
  };
  document.addEventListener('keydown',_keyHandler);

  // Draw path hint: color visited cells lightly
  const visited2=Array.from({length:rows},()=>new Array(cols).fill(false));

  function draw(){
    ctx.clearRect(0,0,CW,CH);
    ctx.fillStyle='#fef9e7';ctx.fillRect(0,0,CW,CH);
    // cells
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      ctx.fillStyle=(c===ex&&r===ey)?'#d1fae5':(c===0&&r===0)?'#ede9fe':'#fffbeb';
      ctx.fillRect(c*SZ+1,r*SZ+1,SZ-1,SZ-1);
    }
    ctx.strokeStyle='#92400e';ctx.lineWidth=2;
    // borders
    ctx.strokeRect(0,0,CW,CH);
    // right walls
    for(let r=0;r<rows;r++)for(let c=0;c<cols-1;c++){
      if(wallR[r][c]){ctx.beginPath();ctx.moveTo((c+1)*SZ,r*SZ);ctx.lineTo((c+1)*SZ,(r+1)*SZ);ctx.stroke();}
    }
    // down walls
    for(let r=0;r<rows-1;r++)for(let c=0;c<cols;c++){
      if(wallD[r][c]){ctx.beginPath();ctx.moveTo(c*SZ,(r+1)*SZ);ctx.lineTo((c+1)*SZ,(r+1)*SZ);ctx.stroke();}
    }
    // goal
    ctx.font=`${SZ-6}px serif`;ctx.textAlign='center';
    ctx.fillText('🏠',ex*SZ+SZ/2,ey*SZ+SZ-3);
    // player
    ctx.fillText(animal,px*SZ+SZ/2,py*SZ+SZ-3);
    ctx.textAlign='left';
    // steps counter
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='bold 11px sans-serif';
    ctx.fillText(`Pasos: ${steps}`,4,14);
  }
  draw();
}

// ================================================================
// GAME 3: DINO
// ================================================================
function playDino(cfg) {
  canvas.width=500;canvas.height=220;
  setInstr(cfg.double?'⬆️ Flecha arriba para saltar (¡doble salto disponible!)':'⬆️ Presiona ARRIBA para saltar y esquivar los cactus');
  let dinoY=155,dy=0,jumping=0;
  let obstacles=[],dist=0,frame=0,scoreN=0;
  let particles=[];
  gameRunning=true;lives=3;setLives(3);

  _keyHandler=e=>{
    if(e.key==='ArrowUp'||e.key===' '){
      e.preventDefault();
      if(jumping<(cfg.double?2:1)){dy=-13;jumping++;}
    }
  };
  document.addEventListener('keydown',_keyHandler);

  function spawnObs(){
    const h=25+Math.random()*25;
    obstacles.push({x:510,h,w:16+Math.random()*10,double:Math.random()<0.15&&currentLevel>4});
  }

  function loop(){
    if(!gameRunning)return;frame++;
    ctx.clearRect(0,0,500,220);
    ctx.fillStyle='#e0f2fe';ctx.fillRect(0,0,500,220);
    // clouds
    [[80,30],[220,20],[380,35],[480,25]].forEach(([cx,cy])=>{
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath();ctx.ellipse(cx-(dist*0.3)%500,cy,28,14,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx-(dist*0.3)%500-18,cy+5,18,11,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx-(dist*0.3)%500+18,cy+5,18,11,0,0,Math.PI*2);ctx.fill();
    });
    // ground
    ctx.fillStyle='#a16207';ctx.fillRect(0,183,500,3);
    for(let i=dist%40;i<500;i+=40){ctx.fillStyle='#d4a017';ctx.fillRect(i,186,20,2);}

    // physics
    dinoY+=dy;dy+=0.7;
    if(dinoY>=155){dinoY=155;dy=0;jumping=0;}

    // obstacles
    if(frame%cfg.freq===0)spawnObs();
    obstacles=obstacles.filter(o=>o.x>-30);
    let hit=false;
    obstacles.forEach(o=>{
      o.x-=cfg.speed+(dist/2000);
      ctx.fillStyle='#16a34a';ctx.fillRect(o.x,183-o.h,o.w,o.h);
      ctx.fillStyle='#166534';ctx.fillRect(o.x-3,183-o.h-10,o.w+6,12);
      if(o.double){
        ctx.fillStyle='#16a34a';ctx.fillRect(o.x+o.w+8,183-o.h*0.6,o.w*0.7,o.h*0.6);
      }
      if(o.x<72&&o.x+o.w>28&&dinoY+40>183-o.h)hit=true;
    });

    // particles
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      ctx.globalAlpha=p.life/15;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();p.x+=p.dx;p.y+=p.dy;p.life--;
    });ctx.globalAlpha=1;

    if(hit&&gameRunning){
      for(let i=0;i<10;i++)particles.push({x:40,y:dinoY+20,dx:(Math.random()-.5)*5,dy:(Math.random()-.5)*5,life:15,r:4,color:'#ef4444'});
      lives--;setLives(lives);
      obstacles=[];
      if(lives<=0){gameRunning=false;showMsg('😅','Game Over','Haz clic para intentar de nuevo');canvas.addEventListener('click',()=>setTimeout(retryLevel,200),{once:true});}
      else{showMsg('😬','¡Cuidado!','');setTimeout(hideMsg,800);}
    }

    dist++;scoreN=Math.floor(dist/10);addScore(0);document.getElementById('score-val').textContent=scoreN;
    if(dist>=1200+(currentLevel-1)*400&&gameRunning){
      gameRunning=false;setTimeout(()=>showWin(lives>=3?3:lives>=2?2:1),300);
    }

    ctx.font='34px serif';
    ctx.fillText(frame%20<10?'🦕':'🦖',18,dinoY+32);
    // progress
    const pct=Math.min(1,dist/(1200+(currentLevel-1)*400));
    ctx.fillStyle='#d1fae5';ctx.fillRect(0,0,500,3);
    ctx.fillStyle='#22c55e';ctx.fillRect(0,0,500*pct,3);

    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ================================================================
// GAME 4: BUBBLES
// ================================================================
function playBubbles(cfg){
  setInstr('🖱️ Haz clic en los globos para reventarlos antes de que escapen');
  let bubbles=[],particles=[];
  timeLeft=cfg.time;
  document.getElementById('time-val').textContent=timeLeft;
  gameRunning=true;
  let spawnT=0;
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff8fb1','#c77dff','#ff9a3c','#00d4ff'];
  const emjs=['😊','⭐','💖','🌈','🎈','🎉','🌟','🐸','🦋'];
  const goal=cfg.time*1.8;

  _clickHandler=e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width);
    const y=(e.clientY-r.top)*(canvas.height/r.height);
    for(let i=bubbles.length-1;i>=0;i--){
      const b=bubbles[i];
      if(Math.hypot(x-b.x,y-b.y)<b.r+6){
        for(let j=0;j<10;j++)particles.push({x:b.x,y:b.y,dx:(Math.random()-.5)*7,dy:(Math.random()-.5)*7,color:b.color,life:20,r:4+Math.random()*4});
        bubbles.splice(i,1);addScore(5);break;
      }
    }
  };
  canvas.addEventListener('click',_clickHandler);

  timerInterval=setInterval(()=>{
    if(!gameRunning)return;
    timeLeft--;document.getElementById('time-val').textContent=timeLeft;
    if(timeLeft<=0){gameRunning=false;setTimeout(()=>showWin(score>=goal*5?3:score>=goal*3?2:1),300);}
  },1000);

  function loop(){
    if(!gameRunning)return;
    spawnT++;
    if(spawnT%cfg.freq===0){
      bubbles.push({x:cfg.size+Math.random()*(480-cfg.size*2),y:390,r:cfg.size,
        dy:-(cfg.speed+Math.random()*0.5),dx:(Math.random()-.5)*0.7,
        color:cols[Math.floor(Math.random()*cols.length)],
        emoji:emjs[Math.floor(Math.random()*emjs.length)],age:0});
    }
    ctx.clearRect(0,0,500,380);
    ctx.fillStyle='#f0f9ff';ctx.fillRect(0,0,500,380);

    bubbles=bubbles.filter(b=>b.y+b.r>0);
    bubbles.forEach(b=>{
      b.x+=b.dx;b.y+=b.dy;b.age++;
      ctx.save();ctx.globalAlpha=Math.min(1,b.age/12);
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle=b.color+'88';ctx.fill();
      ctx.strokeStyle=b.color;ctx.lineWidth=2.5;ctx.stroke();
      ctx.font=`${b.r-6}px serif`;ctx.textAlign='center';
      ctx.fillText(b.emoji,b.x,b.y+5);
      ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
      ctx.restore();
    });

    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      ctx.save();ctx.globalAlpha=p.life/20;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();ctx.restore();
      p.x+=p.dx;p.y+=p.dy;p.life--;
    });

    // cursor
    ctx.beginPath();ctx.arc(mouseCursor.x,mouseCursor.y,14,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,107,53,0.6)';ctx.lineWidth=2;ctx.stroke();
    ctx.font='16px serif';ctx.textAlign='center';
    ctx.fillText('👆',mouseCursor.x,mouseCursor.y+6);ctx.textAlign='left';

    // time bar
    const pct=timeLeft/cfg.time;
    ctx.fillStyle='#fee2e2';ctx.fillRect(0,0,500,5);
    ctx.fillStyle=pct>.5?'#22c55e':pct>.25?'#f59e0b':'#ef4444';
    ctx.fillRect(0,0,500*pct,5);

    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ================================================================
// GAME 5: PAINT (color figures)
// ================================================================
function playPaint(cfg, level){
  setInstr('🖱️ Arrastra el mouse para pintar. Intenta colorear toda la figura sin salirte');
  const figCounts=[1,1,1,2,3,4,5];
  const nFigs=figCounts[level-1];
  const sizes=[120,100,90,80,70,65,55];
  const figSize=sizes[level-1];

  // Generate figures
  const figures=[];
  const colors2=['#ff6b6b','#4d96ff','#ffd93d','#6bcb77','#c77dff','#ff9a3c'];
  const shapes=['circle','rect','star','heart'];

  for(let i=0;i<nFigs;i++){
    const margin=figSize+10;
    figures.push({
      x:margin+Math.random()*(500-margin*2),
      y:margin+Math.random()*(380-margin*2),
      r:figSize,shape:shapes[i%shapes.length],
      color:colors2[i%colors2.length],
      painted:0, total:100
    });
  }

  // offscreen for checking paint coverage
  const offCtx=document.createElement('canvas');
  offCtx.width=500;offCtx.height=380;
  const oCtx=offCtx.getContext('2d');

  let painting=false,lastX=0,lastY=0;
  let brushColor=colors2[0];
  const palette=colors2;
  let allDone=false;

  function drawFigures(c,fill){
    figures.forEach(f=>{
      c.save();c.beginPath();
      if(f.shape==='circle'){c.arc(f.x,f.y,f.r,0,Math.PI*2);}
      else if(f.shape==='rect'){c.roundRect(f.x-f.r,f.y-f.r,f.r*2,f.r*2,12);}
      else if(f.shape==='star'){starPath(c,f.x,f.y,f.r,5);}
      else{heartPath(c,f.x,f.y,f.r);}
      if(fill){c.fillStyle=f.color+'44';c.fill();}
      c.strokeStyle=f.color;c.lineWidth=3;c.stroke();
      c.restore();
    });
  }

  function starPath(c,x,y,r,pts){
    for(let i=0;i<pts*2;i++){
      const angle=i*Math.PI/pts-Math.PI/2;
      const rad=i%2===0?r:r*0.5;
      if(i===0)c.moveTo(x+rad*Math.cos(angle),y+rad*Math.sin(angle));
      else c.lineTo(x+rad*Math.cos(angle),y+rad*Math.sin(angle));
    }c.closePath();
  }
  function heartPath(c,x,y,r){
    c.moveTo(x,y+r*.3);
    c.bezierCurveTo(x,y-r*.5,x-r,y-r*.5,x-r,y);
    c.bezierCurveTo(x-r,y+r*.5,x,y+r*.8,x,y+r);
    c.bezierCurveTo(x,y+r*.8,x+r,y+r*.5,x+r,y);
    c.bezierCurveTo(x+r,y-r*.5,x,y-r*.5,x,y+r*.3);
    c.closePath();
  }

  function redraw(){
    ctx.clearRect(0,0,500,380);
    ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,500,380);
    drawFigures(ctx,true);
    // palette
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.roundRect(5,345,380,30,10);ctx.fill();
    palette.forEach((c,i)=>{
      ctx.beginPath();ctx.arc(24+i*55,360,c===brushColor?13:10,0,Math.PI*2);
      ctx.fillStyle=c;ctx.fill();
      ctx.strokeStyle=c===brushColor?'#333':'#ccc';ctx.lineWidth=c===brushColor?3:1;ctx.stroke();
    });
    // coverage bars
    figures.forEach((f,i)=>{
      const pw=70,px2=390,py2=355-i*14;
      ctx.fillStyle='#e2e8f0';ctx.beginPath();ctx.roundRect(px2,py2,pw,10,4);ctx.fill();
      ctx.fillStyle=f.color;ctx.beginPath();ctx.roundRect(px2,py2,pw*Math.min(1,f.painted/f.total),10,4);ctx.fill();
    });
    // cursor dot
    ctx.beginPath();ctx.arc(mouseCursor.x,mouseCursor.y,10,0,Math.PI*2);
    ctx.fillStyle=brushColor+'cc';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  }

  canvas.addEventListener('mousedown',e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width);
    const y=(e.clientY-r.top)*(canvas.height/r.height);
    if(y>340){
      palette.forEach((c,i)=>{if(Math.hypot(x-(24+i*55),y-360)<16)brushColor=c;});
      redraw();return;
    }
    painting=true;lastX=x;lastY=y;
  });
  _mousedownHandler=()=>{};
  canvas.addEventListener('mouseup',()=>painting=false);
  canvas.addEventListener('mouseleave',()=>painting=false);

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width);
    const y=(e.clientY-r.top)*(canvas.height/r.height);
    mouseCursor.x=x;mouseCursor.y=y;
    if(!painting||y>340)return;
    // check if inside a figure
    figures.forEach(f=>{
      oCtx.save();oCtx.beginPath();
      if(f.shape==='circle')oCtx.arc(f.x,f.y,f.r,0,Math.PI*2);
      else if(f.shape==='rect')oCtx.roundRect(f.x-f.r,f.y-f.r,f.r*2,f.r*2,12);
      else if(f.shape==='star')starPath(oCtx,f.x,f.y,f.r,5);
      else heartPath(oCtx,f.x,f.y,f.r);
      if(oCtx.isPointInPath(x,y)){
        ctx.save();ctx.clip();// doesn't work on main ctx without beginPath
        ctx.restore();
        ctx.save();ctx.beginPath();
        if(f.shape==='circle')ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
        else if(f.shape==='rect')ctx.roundRect(f.x-f.r,f.y-f.r,f.r*2,f.r*2,12);
        else if(f.shape==='star')starPath(ctx,f.x,f.y,f.r,5);
        else heartPath(ctx,f.x,f.y,f.r);
        ctx.clip();
        ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);
        ctx.strokeStyle=brushColor;ctx.lineWidth=20;ctx.lineCap='round';ctx.stroke();
        ctx.restore();
        f.painted=Math.min(f.total,f.painted+2);
      }
      oCtx.restore();
    });
    lastX=x;lastY=y;
    // redraw UI on top
    drawFigures(ctx,false);
    // palette
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.roundRect(5,345,380,30,10);ctx.fill();
    palette.forEach((c,i)=>{
      ctx.beginPath();ctx.arc(24+i*55,360,c===brushColor?13:10,0,Math.PI*2);
      ctx.fillStyle=c;ctx.fill();ctx.strokeStyle=c===brushColor?'#333':'#ccc';ctx.lineWidth=c===brushColor?3:1;ctx.stroke();
    });
    figures.forEach((f,i)=>{
      const pw=70,px2=390,py2=355-i*14;
      ctx.fillStyle='#e2e8f0';ctx.beginPath();ctx.roundRect(px2,py2,pw,10,4);ctx.fill();
      ctx.fillStyle=f.color;ctx.beginPath();ctx.roundRect(px2,py2,pw*Math.min(1,f.painted/f.total),10,4);ctx.fill();
    });
    ctx.beginPath();ctx.arc(mouseCursor.x,mouseCursor.y,10,0,Math.PI*2);
    ctx.fillStyle=brushColor+'cc';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    // check done
    if(!allDone&&figures.every(f=>f.painted>=f.total)){
      allDone=true;setTimeout(()=>showWin(3),400);
    }
    addScore(0);document.getElementById('score-val').textContent=Math.floor(figures.reduce((a,f)=>a+f.painted,0)/figures.length)+'%';
  });

  redraw();
}

// ================================================================
// GAME 6: MEMORY MATCH
// ================================================================
function playMatch(cfg){
  setInstr('🖱️ Haz clic para voltear las tarjetas y encontrar los pares iguales');
  const allAnimals=['🦁','🐘','🐬','🦋','🐸','🦊','🐼','🦄','🐯','🦓','🐙','🦅','🐳','🦒','🦜','🐢'];
  const animals=allAnimals.slice(0,cfg.pairs);
  let cards=[],flipped=[],matched=new Set(),locked=false;

  function init(){
    const pairs=[...animals,...animals].sort(()=>Math.random()-.5);
    const total=pairs.length;
    const cols=Math.ceil(Math.sqrt(total*1.3));
    const rows=Math.ceil(total/cols);
    const cw=Math.floor(480/cols),ch=Math.floor(360/rows);
    const ox=(500-cols*cw)/2,oy=(380-rows*ch)/2;
    cards=pairs.map((e,i)=>({
      e,x:ox+(i%cols)*cw+3,y:oy+Math.floor(i/cols)*ch+3,
      w:cw-6,h:ch-6,face:false,matched:false,bounce:0
    }));
  }

  _clickHandler=e=>{
    if(locked)return;
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width);
    const y=(e.clientY-r.top)*(canvas.height/r.height);
    const c=cards.find(c=>!c.matched&&!c.face&&x>c.x&&x<c.x+c.w&&y>c.y&&y<c.y+c.h);
    if(!c||flipped.includes(c))return;
    c.face=true;flipped.push(c);
    if(flipped.length===2){
      locked=true;
      setTimeout(()=>{
        if(flipped[0].e===flipped[1].e){
          flipped[0].matched=true;flipped[1].matched=true;
          flipped[0].bounce=10;flipped[1].bounce=10;
          matched.add(flipped[0].e);addScore(20);
          if(matched.size===animals.length){
            setTimeout(()=>showWin(score>=cfg.pairs*30?3:score>=cfg.pairs*20?2:1),400);
          }
        }else{flipped[0].face=false;flipped[1].face=false;}
        flipped=[];locked=false;
      },cfg.fast?600:900);
    }
  };
  canvas.addEventListener('click',_clickHandler);

  init();

  function loop(){
    ctx.clearRect(0,0,500,380);
    ctx.fillStyle='#fdf2f8';ctx.fillRect(0,0,500,380);
    cards.forEach(c=>{
      if(c.bounce>0)c.bounce--;
      const sc=c.bounce>0?1+c.bounce*0.03:1;
      const cx=c.x+c.w/2,cy=c.y+c.h/2;
      ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);ctx.translate(-c.w/2,-c.h/2);
      if(c.matched){
        ctx.fillStyle='#d1fae5';ctx.beginPath();ctx.roundRect(0,0,c.w,c.h,12);ctx.fill();
        ctx.strokeStyle='#34d399';ctx.lineWidth=2.5;ctx.stroke();
      }else if(c.face){
        ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(0,0,c.w,c.h,12);ctx.fill();
        ctx.strokeStyle='#a78bfa';ctx.lineWidth=2.5;ctx.stroke();
      }else{
        const hov=mouseCursor.x>c.x&&mouseCursor.x<c.x+c.w&&mouseCursor.y>c.y&&mouseCursor.y<c.y+c.h;
        ctx.fillStyle=hov?'#ddd6fe':'#ede9fe';ctx.beginPath();ctx.roundRect(0,0,c.w,c.h,12);ctx.fill();
        ctx.strokeStyle=hov?'#7c3aed':'#c4b5fd';ctx.lineWidth=2;ctx.stroke();
      }
      const fs=Math.min(c.w,c.h)*0.5;
      ctx.font=`${fs}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      if(c.face||c.matched)ctx.fillText(c.e,c.w/2,c.h/2);
      else ctx.fillText('❓',c.w/2,c.h/2);
      ctx.restore();
    });
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ================================================================
// GAME 7: CATCH FRUITS
// ================================================================
function playCatch(cfg){
  setInstr('🖱️ Mueve el mouse para mover la cesta y atrapar las frutas que caen');
  let items=[],particles=[],basketX=250;
  const fruits=['🍎','🍊','🍋','🍇','🍓','🍒','🍌','🍉'];
  const bads=['💣','❌'];
  let frame=0,caught=0,goal=10+currentLevel*3;
  lives=3;setLives(3);gameRunning=true;

  _moveHandler=(x)=>{basketX=Math.max(cfg.bw/2,Math.min(500-cfg.bw/2,x));};
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    _moveHandler((e.clientX-r.left)*(canvas.width/r.width));
  });

  function spawnItem(){
    const isBad=Math.random()<0.15&&currentLevel>2;
    items.push({x:30+Math.random()*440,y:-20,dy:cfg.speed+Math.random()*1,
      emoji:isBad?bads[Math.floor(Math.random()*bads.length)]:fruits[Math.floor(Math.random()*fruits.length)],
      bad:isBad,size:28+Math.random()*10});
  }

  function loop(){
    if(!gameRunning)return;frame++;
    if(frame%cfg.freq===0)spawnItem();
    ctx.clearRect(0,0,500,380);
    // bg gradient sky
    const g=ctx.createLinearGradient(0,0,0,380);
    g.addColorStop(0,'#bfdbfe');g.addColorStop(1,'#dbeafe');
    ctx.fillStyle=g;ctx.fillRect(0,0,500,380);
    // grass
    ctx.fillStyle='#86efac';ctx.fillRect(0,355,500,25);
    ctx.fillStyle='#4ade80';
    for(let i=0;i<500;i+=12)ctx.fillRect(i,355,6,6+Math.random()*4);

    items=items.filter(it=>it.y<400);
    items.forEach(it=>{
      it.y+=it.dy;
      // check catch
      if(it.y+it.size/2>345&&it.y<375){
        if(Math.abs(it.x-basketX)<cfg.bw/2+it.size/4){
          if(!it.caught){
            it.caught=true;
            if(it.bad){
              lives--;setLives(lives);
              for(let i=0;i<8;i++)particles.push({x:it.x,y:it.y,dx:(Math.random()-.5)*6,dy:-Math.random()*4,life:18,color:'#ef4444',r:5});
              if(lives<=0){gameRunning=false;showMsg('😢','¡Se te acabaron las vidas!','Haz clic para intentar de nuevo');canvas.addEventListener('click',()=>setTimeout(retryLevel,200),{once:true});}
            }else{
              caught++;addScore(10);
              for(let i=0;i<8;i++)particles.push({x:it.x,y:it.y,dx:(Math.random()-.5)*5,dy:-Math.random()*5,life:18,color:'#fbbf24',r:5});
              if(caught>=goal){gameRunning=false;setTimeout(()=>showWin(lives>=3?3:lives>=2?2:1),300);}
            }
          }
          return;
        }
      }
      // missed
      if(it.y>380&&!it.caught&&!it.bad){
        lives--;setLives(lives);it.caught=true;
        if(lives<=0){gameRunning=false;showMsg('😢','¡Se te cayeron las frutas!','Haz clic para intentar de nuevo');canvas.addEventListener('click',()=>setTimeout(retryLevel,200),{once:true});}
      }
      if(!it.caught){
        ctx.font=`${it.size}px serif`;ctx.textAlign='center';
        ctx.fillText(it.emoji,it.x,it.y);
      }
    });

    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      ctx.save();ctx.globalAlpha=p.life/18;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();ctx.restore();
      p.x+=p.dx;p.y+=p.dy;p.life--;
    });

    // basket
    ctx.fillStyle='#d97706';ctx.beginPath();ctx.roundRect(basketX-cfg.bw/2,350,cfg.bw,28,8);ctx.fill();
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.roundRect(basketX-cfg.bw/2+3,350,cfg.bw-6,8,4);ctx.fill();
    // weave pattern
    ctx.strokeStyle='#b45309';ctx.lineWidth=1.5;
    for(let i=0;i<cfg.bw;i+=10){ctx.beginPath();ctx.moveTo(basketX-cfg.bw/2+i,350);ctx.lineTo(basketX-cfg.bw/2+i,378);ctx.stroke();}

    // progress
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='bold 13px sans-serif';ctx.textAlign='right';
    ctx.fillText(`🧺 ${caught}/${goal}`,CW=497,18);ctx.textAlign='left';
    const pct=Math.min(1,caught/goal);
    ctx.fillStyle='#d1fae5';ctx.fillRect(0,0,500,4);
    ctx.fillStyle='#22c55e';ctx.fillRect(0,0,500*pct,4);

    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ================================================================
// GAME 8: BALLOON NAVIGATOR
// ================================================================
function playBalloon(cfg){
  canvas.width=500;canvas.height=380;
  setInstr('⬆️⬇️⬅️➡️ Usa las flechas para navegar el globo evitando las nubes');
  let bx=80,by=190,vx=0,vy=0;
  let clouds=[],frame=0,dist=0,goal=800+currentLevel*200;
  lives=3;setLives(3);gameRunning=true;
  const bs=cfg.size;

  for(let i=0;i<cfg.clouds;i++){
    clouds.push({x:200+Math.random()*600,y:30+Math.random()*320,w:60+Math.random()*60,h:25+Math.random()*20,dy:(Math.random()-.5)*0.4});
  }

  const keys={ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false};
  _keyHandler=e=>{
    if(keys.hasOwnProperty(e.key)){keys[e.key]=e.type==='keydown';e.preventDefault();}
  };
  document.addEventListener('keydown',_keyHandler);
  document.addEventListener('keyup',e=>{if(keys.hasOwnProperty(e.key))keys[e.key]=false;});

  function loop(){
    if(!gameRunning)return;frame++;
    // physics
    if(keys.ArrowUp)vy-=0.3;if(keys.ArrowDown)vy+=0.3;
    if(keys.ArrowLeft)vx-=0.25;if(keys.ArrowRight)vx+=0.25;
    vx*=0.95;vy*=0.95;
    bx+=vx;by+=vy;
    bx=Math.max(bs,Math.min(500-bs,bx));
    by=Math.max(bs,Math.min(380-bs,by));

    ctx.clearRect(0,0,500,380);
    // sky
    const sky=ctx.createLinearGradient(0,0,0,380);
    sky.addColorStop(0,'#60a5fa');sky.addColorStop(1,'#bfdbfe');
    ctx.fillStyle=sky;ctx.fillRect(0,0,500,380);

    // move clouds leftward
    clouds.forEach(c=>{
      c.x-=cfg.speed*0.4;c.y+=c.dy;
      c.y=Math.max(20,Math.min(350,c.y));
      if(c.x+c.w<0)c.x=520+Math.random()*100;
    });

    // collision & draw clouds
    let hit=false;
    clouds.forEach(c=>{
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.beginPath();ctx.ellipse(c.x+c.w/2,c.y,c.w/2,c.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(c.x+c.w*.3,c.y+c.h*.2,c.w*.3,c.h*.35,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(c.x+c.w*.7,c.y+c.h*.2,c.w*.3,c.h*.35,0,0,Math.PI*2);ctx.fill();
      // collision check (ellipse approx)
      const dx2=(bx-(c.x+c.w/2))/(c.w/2+bs);
      const dy2=(by-c.y)/(c.h/2+bs);
      if(dx2*dx2+dy2*dy2<1)hit=true;
    });

    if(hit&&gameRunning){
      lives--;setLives(lives);
      // push balloon away from cloud
      vx+=(bx<250?-3:3);vy+=(by<190?-3:3);
      if(lives<=0){gameRunning=false;showMsg('😢','¡El globo se pinchó!','Haz clic para intentar de nuevo');canvas.addEventListener('click',()=>setTimeout(retryLevel,200),{once:true});}
      else{showMsg('💨','¡Cuidado!','');setTimeout(hideMsg,700);}
    }

    dist++;
    // progress bar
    const pct=Math.min(1,dist/goal);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(0,0,500,6);
    ctx.fillStyle='#fbbf24';ctx.fillRect(0,0,500*pct,6);
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='bold 12px sans-serif';ctx.textAlign='right';
    ctx.fillText(`🌟 ${Math.floor(pct*100)}%`,CW=497,20);ctx.textAlign='left';

    // balloon
    ctx.font=`${bs*2}px serif`;ctx.textAlign='center';
    ctx.fillText('🎈',bx,by+bs);
    ctx.textAlign='left';

    if(dist>=goal&&gameRunning){gameRunning=false;setTimeout(()=>showWin(lives>=3?3:lives>=2?2:1),300);}
    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ================================================================
// GAME 9: TYPING (arrow keys)
// ================================================================
function playTyping(cfg){
  setInstr('⬆️⬇️⬅️➡️ Presiona la flecha que aparece en pantalla. ¡Rápido!');
  timeLeft=cfg.time;
  document.getElementById('time-val').textContent=timeLeft;
  gameRunning=true;

  const arrowKeys=cfg.keys===2?['ArrowUp','ArrowDown']:['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
  const arrowEmoji={ArrowUp:'⬆️',ArrowDown:'⬇️',ArrowLeft:'⬅️',ArrowRight:'➡️'};
  const seq=cfg.seq||1;
  let current=[],pos=0,feedback='',fbTimer=0,streak=0,best=0;
  let lastChange=0;

  function genSeq(){
    current=[];
    for(let i=0;i<seq;i++)current.push(arrowKeys[Math.floor(Math.random()*arrowKeys.length)]);
    pos=0;lastChange=Date.now();
  }
  genSeq();

  _keyHandler=e=>{
    if(!gameRunning)return;
    if(arrowKeys.includes(e.key)){
      e.preventDefault();
      if(e.key===current[pos]){
        pos++;streak++;best=Math.max(best,streak);
        if(pos>=current.length){addScore(10*seq+(streak>3?5:0));genSeq();feedback='✅';fbTimer=15;}
      }else{
        streak=0;feedback='❌';fbTimer=15;pos=0;
      }
    }
  };
  document.addEventListener('keydown',_keyHandler);

  timerInterval=setInterval(()=>{
    if(!gameRunning)return;
    timeLeft--;document.getElementById('time-val').textContent=timeLeft;
    if(timeLeft<=0){gameRunning=false;setTimeout(()=>showWin(score>=cfg.time*8?3:score>=cfg.time*4?2:1),300);}
  },1000);

  // auto advance if taking too long
  let autoTimer=setInterval(()=>{
    if(!gameRunning){clearInterval(autoTimer);return;}
    if(Date.now()-lastChange>cfg.speed){genSeq();feedback='⏩';fbTimer=10;}
  },500);

  function loop(){
    if(!gameRunning)return;
    ctx.clearRect(0,0,500,380);
    ctx.fillStyle='#fdf4ff';ctx.fillRect(0,0,500,380);

    // background dots
    ctx.fillStyle='rgba(168,85,247,0.08)';
    for(let i=0;i<15;i++)for(let j=0;j<10;j++)ctx.beginPath(),ctx.arc(i*36,j*42,6,0,Math.PI*2),ctx.fill();

    // show sequence
    const total=current.length;
    const startX=(500-total*90)/2;
    current.forEach((k,i)=>{
      const x=startX+i*90,y=160;
      const done=i<pos;
      ctx.fillStyle=done?'#d1fae5':i===pos?'#ede9fe':'#f1f5f9';
      ctx.beginPath();ctx.roundRect(x,y-50,80,80,16);ctx.fill();
      ctx.strokeStyle=done?'#34d399':i===pos?'#a855f7':'#cbd5e1';ctx.lineWidth=done||i===pos?3:1;ctx.stroke();
      ctx.font='40px serif';ctx.textAlign='center';ctx.fillText(arrowEmoji[k],x+40,y+12);
    });

    // feedback
    if(fbTimer>0){
      fbTimer--;
      ctx.font='bold 60px serif';ctx.textAlign='center';
      ctx.globalAlpha=fbTimer/15;
      ctx.fillText(feedback,250,280);
      ctx.globalAlpha=1;
    }

    // streak
    if(streak>1){
      ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillStyle='#a855f7';
      ctx.fillText(`🔥 Racha: ${streak}`,250,340);
    }
    // score big
    ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.fillStyle='#6b21a8';
    ctx.fillText(`★ ${score} pts`,250,370);
    ctx.textAlign='left';
    // time bar
    const pct=timeLeft/cfg.time;
    ctx.fillStyle='#f3e8ff';ctx.fillRect(0,0,500,5);
    ctx.fillStyle=pct>.5?'#a855f7':pct>.25?'#f59e0b':'#ef4444';
    ctx.fillRect(0,0,500*pct,5);

    animId=requestAnimationFrame(loop);
  }
  animId=requestAnimationFrame(loop);
}

// ================================================================
// GAME 10: COLOR MIX
// ================================================================
function playColorMix(cfg, level){
  setInstr('🖱️ Arrastra los colores hacia el cubo para mezclarlos y lograr el color objetivo');

  const primaries=[
    {name:'Rojo',color:'#ef4444',r:255,g:0,b:0},
    {name:'Azul',color:'#3b82f6',r:0,g:0,b:255},
    {name:'Amarillo',color:'#eab308',r:255,g:234,b:0},
    {name:'Verde',color:'#22c55e',r:0,g:255,b:0},
    {name:'Naranja',color:'#f97316',r:255,g:165,b:0},
    {name:'Morado',color:'#a855f7',r:128,g:0,b:128},
  ];

  const nColors=cfg.colors;
  const srcColors=primaries.slice(0,nColors);

  // Target colors to achieve (simple mixes of the available primaries)
  const targetMixes=[
    {name:'Naranja',r:255,g:115,b:0},{name:'Verde',r:100,g:200,b:50},
    {name:'Morado',r:130,g:50,b:180},{name:'Rosado',r:255,g:100,b:150},
    {name:'Café',r:160,g:80,b:30},{name:'Turquesa',r:40,g:180,b:180},
  ];
  let targets=targetMixes.slice(0,Math.min(3+currentLevel,6));
  let tIdx=0;
  let mixed={r:255,g:255,b:255};
  let drops=[];
  let dragging=null;
  let completed=0;

  function rgbStr(r,g,b){return`rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;}
  function colorDist(a,b){return Math.sqrt((a.r-b.r)**2+(a.g-b.g)**2+(a.b-b.b)**2);}

  function reset(){mixed={r:255,g:255,b:255};drops=[];}

  function draw(){
    ctx.clearRect(0,0,500,380);
    ctx.fillStyle='#fefce8';ctx.fillRect(0,0,500,380);

    // Title
    ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillStyle='#713f12';
    ctx.fillText(`Mezcla para obtener: ${targets[tIdx]?.name||''}`,250,22);

    // Target color swatch
    const tgt=targets[tIdx];
    if(tgt){
      ctx.fillStyle=rgbStr(tgt.r,tgt.g,tgt.b);
      ctx.beginPath();ctx.roundRect(180,35,140,55,14);ctx.fill();
      ctx.strokeStyle='#92400e';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
      ctx.fillText('Objetivo',250,52);
    }

    // Mix bucket (center bottom)
    const bx=220,by=260,bw=60,bh=70;
    ctx.fillStyle=rgbStr(mixed.r,mixed.g,mixed.b);
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+bw,by);ctx.lineTo(bx+bw-10,by+bh);ctx.lineTo(bx+10,by+bh);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#92400e';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('🪣 Cubo',250,355);

    // Source colors as draggable blobs
    const spacing=500/(nColors+1);
    srcColors.forEach((c,i)=>{
      const isDrag=dragging&&dragging.idx===i;
      const cx=isDrag?dragging.cx:spacing*(i+1);
      const cy=isDrag?dragging.cy:180;
      ctx.beginPath();ctx.arc(cx,cy,isDrag?28:24,0,Math.PI*2);
      ctx.fillStyle=c.color;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
      ctx.fillText(c.name,cx,cy+5);
    });

    // drops falling
    drops.forEach(d=>{
      ctx.beginPath();ctx.arc(d.x,d.y,8,0,Math.PI*2);
      ctx.fillStyle=d.color;ctx.fill();
    });

    // Score
    ctx.fillStyle='#713f12';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText(`✅ ${completed} / ${targets.length}`,250,378);
    // Reset button area
    ctx.fillStyle='#fee2e2';ctx.beginPath();ctx.roundRect(380,155,105,35,10);ctx.fill();
    ctx.strokeStyle='#fca5a5';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#dc2626';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
    ctx.fillText('🔄 Limpiar',432,177);
    ctx.textAlign='left';
  }

  canvas.addEventListener('mousedown',e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width);
    const y=(e.clientY-r.top)*(canvas.height/r.height);
    // reset btn
    if(x>380&&x<485&&y>155&&y<190){reset();draw();return;}
    const spacing=500/(nColors+1);
    srcColors.forEach((c,i)=>{
      const cx=spacing*(i+1),cy=180;
      if(Math.hypot(x-cx,y-cy)<28)dragging={idx:i,cx:x,cy:y,color:c.color,src:c};
    });
  });
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width);
    const y=(e.clientY-r.top)*(canvas.height/r.height);
    mouseCursor.x=x;mouseCursor.y=y;
    if(dragging){dragging.cx=x;dragging.cy=y;}
    draw();
  });
  canvas.addEventListener('mouseup',e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(canvas.width/r.width);
    const y=(e.clientY-r.top)*(canvas.height/r.height);
    if(dragging){
      // dropped in bucket?
      if(x>210&&x<290&&y>250&&y<340){
        const s=dragging.src;
        // mix into bucket (average)
        mixed.r=(mixed.r+s.r)/2;mixed.g=(mixed.g+s.g)/2;mixed.b=(mixed.b+s.b)/2;
        drops=[];
        // check match
        const tgt=targets[tIdx];
        if(tgt&&colorDist(mixed,tgt)<80){
          completed++;addScore(30);
          showMsg('🎨',`¡${tgt.name} perfecto!`,'');setTimeout(hideMsg,800);
          tIdx++;reset();
          if(tIdx>=targets.length){gameRunning=false;setTimeout(()=>showWin(completed>=targets.length?3:completed>=targets.length*0.7?2:1),400);}
        }
      }
      dragging=null;
    }
    draw();
  });
  draw();
}

// ================================================================
// BUILD MENU
// ================================================================
function buildMenu(){
  const grid=document.getElementById('games-grid');
  GAMES.forEach(g=>{
    const d=document.createElement('div');
    d.className=`gcard ${g.type}`;
    const unl=maxUnlocked(g.id);
    const stars=Object.values(progress[g.id]||{}).reduce((a,b)=>a+b,0);
    d.innerHTML=`<span class="icon">${g.icon}</span><div class="gname">${g.name}</div><div class="gtype">${g.type==='arrow'?'⌨️ Flechas':'🖱️ Mouse'}</div>${stars>0?`<div style="font-size:.7rem;color:#f59e0b;margin-top:3px">${'⭐'.repeat(Math.min(3,stars))} Nv.${unl-1}</div>`:''}`;
    d.onclick=()=>showLevels(g.id);
    grid.appendChild(d);
  });
}

buildMenu();
</script>
